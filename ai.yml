---
- name: "The 2026 Ultimate Linux Desktop (Incl. Local AI)"
  hosts: localhost
  connection: local
  become: yes
  vars:
    font_size: 11
    font_name: "JetBrainsMono Nerd Font"
    # Systeem-pakketten
    core_pkgs: [micro, vim, kitty, terminator, eza, bat, fzf, jq, btop, duf, tldr, kubectl, terraform, helm, ansible-lint, docker.io, curl, git, unzip, flatpak]

  tasks:
    - name: "BASIS: Stil opstarten & Core Tools"
      block:
        - ansible.builtin.package: { name: "{{ core_pkgs }}", state: present }
        - ansible.builtin.lineinfile:
            path: /etc/default/grub
            regexp: '^GRUB_CMDLINE_LINUX_DEFAULT='
            line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet loglevel=3 systemd.show_status=auto rd.udev.log_level=3"'
          notify: Update GRUB
      tags: [always, core]

    - name: "AI-STACK: Lokale Copilot (Ollama)"
      block:
        - name: "Ollama installeren via officiële binary"
          ansible.builtin.shell: "curl -fsSL https://ollama.com/install.sh | sh"
        - name: "Llama3 model ophalen"
          ansible.builtin.command: "ollama pull llama3"
      tags: ai

    - name: "MEDIA: YouTuber & Creator Stack"
      community.general.flatpak:
        name: [org.kde.kdenlive, com.obsproject.Studio, org.blender.Blender, org.gimp.GIMP, org.inkscape.Inkscape, org.darktable.Darktable, org.shotcut.Shotcut, fr.handbrake.ghb]
        state: present
      tags: media

    - name: "GAMER: High Performance Gaming"
      community.general.flatpak:
        name: [com.discordapp.Discord, com.heroicgamelauncher.hgl, com.valvesoftware.Steam.CompatibilityTool.Proton-GE]
        state: present
      tags: gamer

    - name: "CONFIG: Nord-Thema & Aliassen"
      become: no
      block:
        - ansible.builtin.copy:
            dest: "~/.config/kitty/kitty.conf"
            content: "font_family {{ font_name }}\nfont_size {{ font_size }}.0\nbackground #2e3440\nforeground #d8dee9"
        - ansible.builtin.blockinfile:
            path: "~/.{{ ansible_env.SHELL | basename }}rc"
            block: |
              alias ls='eza --icons'
              alias ai='ollama run llama3'
              alias k='kubectl'
              export EDITOR='micro'
      tags: [always, config]

  handlers:
    - name: Update GRUB
      ansible.builtin.command: "{{ 'update-grub' if ansible_os_family == 'Debian' else 'grub-mkconfig -o /boot/grub/grub.cfg' }}"

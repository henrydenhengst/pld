- name: Installeer Printer en Periferie ondersteuning
  apt:
    name:
      - cups
      - cups-filters
      - system-config-printer
      - hplip # Voor HP printers (onmisbaar)
      - sane-utils # Voor scanners
      - simple-scan
    state: present

- name: Start en enable de Printer Service
  systemd:
    name: cups
    state: started
    enabled: yes

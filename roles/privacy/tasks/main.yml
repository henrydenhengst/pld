---
- name: "Privacy: Schakel IPv6 uit op Kernel-niveau (Anti-DNS-Leak)"
  ansible.posix.sysctl:
    name: "{{ item }}"
    value: '1'
    state: present
    reload: yes
  loop:
    - net.ipv6.conf.all.disable_ipv6
    - net.ipv6.conf.default.disable_ipv6

- name: "Privacy: Installeer Security Tools"
  ansible.builtin.apt:
    name:
      - tor
      - onioncircuits
      - metadata-cleaner
      - ufw
    state: present

- name: "Privacy: Configureer Egress Filtering (Alleen HTTP/S en DNS)"
  community.general.ufw:
    rule: allow
    direction: out
    dest: any
    port: "{{ item }}"
  loop: ['80', '443', '53']

- name: "Privacy: Blokkeer al het overige uitgaand verkeer"
  community.general.ufw:
    policy: deny
    direction: outgoing

---
- name: Installeer de DHCP server software
  ansible.builtin.apt:
    name: isc-dhcp-server
    state: present

- name: Configureer de DHCP interface (NIC 2)
  ansible.builtin.lineinfile:
    path: /etc/default/isc-dhcp-server
    regexp: '^INTERFACESv4='
    line: 'INTERFACESv4="{{ valid_ethernet_nics[1] }}"'
  notify: Herstart DHCP server

- name: Schrijf de DHCP configuratie (pld-dhcp.conf)
  ansible.builtin.blockinfile:
    path: /etc/dhcp/dhcpd.conf
    block: |
      # PLD Installatie Netwerk
      subnet 192.168.100.0 netmask 255.255.255.0 {
        range 192.168.100.50 192.168.100.250;
        option routers 192.168.100.1;
        option domain-name-servers 8.8.8.8, 1.1.1.1;
        default-lease-time 600;
        max-lease-time 7200;
      }
  notify: Herstart DHCP server

- name: Zorg dat de DHCP server gestart is
  ansible.builtin.service:
    name: isc-dhcp-server
    state: started
    enabled: yes

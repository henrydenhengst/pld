---
- name: "The 2026 Gold Standard Linux Desktop"
  hosts: localhost
  connection: local
  become: yes
  vars:
    font_size: 11
    font_name: "JetBrainsMono Nerd Font"
    
    # Core DevOps & System Tools (Native)
    core_pkgs: [micro, vim, kitty, terminator, eza, bat, fzf, jq, btop, duf, tldr, kubectl, terraform, helm, ansible-lint, docker.io, docker-compose-v2, curl, git, unzip, flatpak]

    # App Stacks (10+ per groep, mix van Native & Flatpak)
    stacks:
      media: 
        native: [audacity, handbrake, mkvtoolnix-gui]
        flatpak: [org.kde.kdenlive, com.obsproject.Studio, org.blender.Blender, org.gimp.GIMP, org.inkscape.Inkscape, org.darktable.Darktable, org.shotcut.Shotcut, org.pitivi.Pitivi, org.openshot.OpenShot, fr.handbrake.ghb]
      gamer:
        native: [steam, lutris, gamemode, wine-staging]
        flatpak: [com.discordapp.Discord, com.heroicgamelauncher.hgl, org.gnome.World.PikaBackup, net.davidotek.pupgui2, com.valvesoftware.Steam.CompatibilityTool.Proton-GE]
      office:
        native: [libreoffice, thunderbird, evince]
        flatpak: [com.slack.Slack, us.zoom.Zoom, com.nextcloud.desktopclient.nextcloud, com.bitwarden.desktop, org.gnome.pdfarranger, com.skype.Client, com.microsoft.Teams, org.xmind.XMind]
      edu:
        native: [anki, stellarium, kalzium]
        flatpak: [org.zotero.Zotero, org.geogebra.GeoGebra, net.ankiweb.Anki, org.kde.okular, org.kde.kcalc, io.github.xournalpp.Xournalpp, org.scratch.Scratch]

  tasks:
    - name: "1. Systeem: Stil opstarten (GRUB)"
      ansible.builtin.lineinfile:
        path: /etc/default/grub
        regexp: "{{ item.regexp }}"
        line: "{{ item.line }}"
      loop:
        - { regexp: '^GRUB_TIMEOUT=', line: 'GRUB_TIMEOUT=0' }
        - { regexp: '^GRUB_CMDLINE_LINUX_DEFAULT=', line: 'GRUB_CMDLINE_LINUX_DEFAULT="quiet loglevel=3 systemd.show_status=auto rd.udev.log_level=3 vt.global_cursor_default=0"' }
      notify: Update GRUB

    - name: "2. Installeren: Core DevOps Stack"
      ansible.builtin.package: { name: "{{ core_pkgs }}", state: present }

    - name: "3. Flatpak: Flathub Repo toevoegen"
      community.general.flatpak_remote:
        name: flathub
        state: present
        flatpakrepo_url: https://dl.flathub.org/repo/flathub.flatpakrepo

    - name: "4. Config: Nord-Thema & 11px Fonts"
      become: no
      ansible.builtin.copy:
        dest: "{{ item.p }}"
        content: "{{ item.c }}"
      loop:
        - { p: "~/.config/kitty/kitty.conf", c: "font_family {{ font_name }}\nfont_size {{ font_size }}.0\nbackground #2e3440\nforeground #d8dee9" }
        - { p: "~/.config/micro/settings.json", c: '{"colorscheme": "nord", "fontsize": {{ font_size }}}' }
        - { p: "~/.config/btop/btop.conf", c: 'color_theme = "nord"' }

    - name: "5. Shell: Aliassen voor alle shells"
      become: no
      ansible.builtin.blockinfile:
        path: "~/.{{ ansible_env.SHELL | basename }}rc"
        marker: "# {mark} DEVOPS MASTER"
        block: |
          alias ls='eza --icons'
          alias cat='bat --theme="Nord"'
          alias k='kubectl'
          alias d='docker'
          export EDITOR='micro'

  handlers:
    - name: Update GRUB
      ansible.builtin.command: "{{ 'update-grub' if ansible_os_family == 'Debian' else 'grub-mkconfig -o /boot/grub/grub.cfg' }}"

---
- name: "The Complete Linux DevOps Environment (Nord/11px)"
  hosts: localhost
  connection: local
  vars:
    font_size: 11
    font_name: "JetBrainsMono Nerd Font"
    # Universele pakketlijst
    pkgs: 
      - micro
      - vim
      - kitty
      - terminator
      - eza
      - bat
      - fzf
      - jq
      - btop
      - duf
      - tldr
      - kubectl
      - terraform
      - helm
      - ansible-lint
      - docker.io
      - docker-compose-v2
      - curl
      - git
      - unzip

  tasks:
    - name: "Installatie van de volledige DevOps stack"
      become: yes
      ansible.builtin.package:
        name: "{{ pkgs }}"
        state: present

    - name: "Gebruiker toevoegen aan Docker groep"
      become: yes
      ansible.builtin.user:
        name: "{{ ansible_env.USER }}"
        groups: docker
        append: yes

    - name: "Configuratie mappen aanmaken"
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: '0755'
      loop:
        - "~/.config/kitty"
        - "~/.config/terminator"
        - "~/.config/micro"
        - "~/.config/btop"
        - "~/.local/bin"

    - name: "Nord-Thema & 11px Font uitrollen (Terminals & Editors)"
      ansible.builtin.copy:
        dest: "{{ item.p }}"
        content: "{{ item.c }}"
      loop:
        - p: "~/.config/kitty/kitty.conf"
          c: |
            font_family {{ font_name }}
            font_size {{ font_size }}.0
            background #2e3440
            foreground #d8dee9
            selection_background #4c566a
            color0 #3b4252
            color4 #81a1c1
        - p: "~/.config/terminator/config"
          c: |
            [global_config]
            [profiles]
              [[default]]
                font = {{ font_name }} {{ font_size }}
                use_system_font = False
                background_color = "#2e3440"
                foreground_color = "#d8dee9"
        - p: "~/.config/micro/settings.json"
          c: '{"colorscheme": "nord", "fontsize": {{ font_size }}, "mkparents": true}'
        - p: "~/.config/btop/btop.conf"
          c: 'color_theme = "nord"'

    - name: "Vim Minimalist Config"
      ansible.builtin.copy:
        dest: "~/.vimrc"
        content: "syntax on\nset number\nset mouse=a\nset tabstop=4"

    - name: "Shell Detectie & Injecteren van Aliassen"
      ansible.builtin.blockinfile:
        path: "~/.{{ ansible_env.SHELL | basename }}rc"
        create: yes
        marker: "# {mark} DEVOPS MASTER BLOCK"
        block: |
          # Modern CLI replacements
          alias ls='eza --icons --group-directories-first'
          alias ll='eza -lgh --icons'
          alias cat='bat --theme="Nord"'
          alias top='btop'
          alias df='duf'
          
          # DevOps Shortcuts
          alias k='kubectl'
          alias d='docker'
          alias dc='docker compose'
          alias tf='terraform'
          alias ap='ansible-playbook'
          
          export EDITOR='micro'
          export PATH="$PATH:$HOME/.local/bin"
